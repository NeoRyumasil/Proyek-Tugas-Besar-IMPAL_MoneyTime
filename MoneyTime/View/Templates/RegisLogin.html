<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyTime - Login & Register</title>
    
    <link rel="icon" href="{{ url_for('static', filename='logoMoneyTime.svg') }}">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .container.right-panel-active .sign-in-container { transform: translateX(100%); opacity: 0; z-index: 1; }
        .container.right-panel-active .sign-up-container { transform: translateX(100%); opacity: 1; z-index: 5; animation: show 0.6s; }
        .container.right-panel-active .overlay-container { transform: translateX(-100%); }
        .container.right-panel-active .overlay { transform: translateX(50%); }
        .container.right-panel-active .overlay-left { transform: translateX(0); }
        .container.right-panel-active .overlay-right { transform: translateX(20%); }
        
        @keyframes show {
            0%, 49.99% { opacity: 0; z-index: 1; }
            50%, 100% { opacity: 1; z-index: 5; }
        }
    </style>
</head>
<body class="bg-gray-100 flex justify-center items-center h-screen font-sans antialiased text-gray-800">

    <!-- Container Utama -->
    <div class="relative w-full max-w-4xl min-h-[600px] bg-white shadow-2xl rounded-2xl overflow-hidden container transition-all duration-500 ease-in-out" id="main-container">
        <!---Register-->
        <div class="absolute top-0 left-0 w-1/2 h-full opacity-0 z-10 transition-all duration-500 ease-in-out sign-up-container bg-white px-12 py-10 flex flex-col justify-center">
            <form action="{{ url_for('auth.register') }}" method="POST" class="flex flex-col items-center justify-center h-full text-center">
                <h1 class="text-3xl font-extrabold mb-2">Register</h1>
                <p class="text-gray-500 mb-6 text-sm">Create your account</p>
                
                <div class="w-full flex items-center bg-gray-50 rounded-lg px-4 py-3 mb-4 border border-gray-200 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 transition-all">
                    <i class="fa-solid fa-user text-gray-400"></i>
                    <input type="text" placeholder="Username" name="register_username" required class="bg-transparent outline-none flex-1 ml-3 text-sm">
                </div>
                
                <div class="w-full flex items-center bg-gray-50 rounded-lg px-4 py-3 mb-4 border border-gray-200 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 transition-all">
                    <i class="fa-solid fa-envelope text-gray-400"></i>
                    <input type="email" placeholder="Email" name="register_email" required class="bg-transparent outline-none flex-1 ml-3 text-sm">
                </div>
                
                <div class="w-full flex items-center bg-gray-50 rounded-lg px-4 py-3 mb-4 border border-gray-200 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 transition-all relative">
                    <i class="fa-solid fa-lock text-gray-400"></i>
                    <input type="password" name="register_password" placeholder="Password" id="register-password" required class="bg-transparent outline-none flex-1 ml-3 text-sm pr-8">
                    <i class="fa-regular fa-eye-slash cursor-pointer text-gray-400 hover:text-gray-600 absolute right-4" id="toggle-register-password"></i>
                </div>
                
                <div class="w-full flex items-center bg-gray-50 rounded-lg px-4 py-3 mb-4 border border-gray-200 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 transition-all relative">
                    <i class="fa-solid fa-lock text-gray-400"></i>
                    <input type="password" name="register_confirm" placeholder="Confirm Password" id="confirm-password" required class="bg-transparent outline-none flex-1 ml-3 text-sm pr-8">
                    <i class="fa-regular fa-eye-slash cursor-pointer text-gray-400 hover:text-gray-600 absolute right-4" id="toggle-confirm-password"></i>
                </div>
                
                <div class="w-full flex items-center gap-2 mb-6 text-sm text-gray-600">
                    <input type="checkbox" id="terms" required class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                    <label for="terms">I Agree to the Terms & Condition</label>
                </div>
                
                <div id="register-error" class="hidden text-red-500 text-sm mb-4 w-full text-left"></div>
                
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-full shadow-lg transition-transform hover:-translate-y-0.5">Register</button>
            </form>
        </div>
        
        <!--Login-->
        <div class="absolute top-0 left-0 w-1/2 h-full z-20 transition-all duration-500 ease-in-out sign-in-container bg-white px-12 py-10 flex flex-col justify-center">
            <form action="{{ url_for('auth.login') }}" method="POST" class="flex flex-col items-center justify-center h-full text-center">
                <h1 class="text-3xl font-extrabold mb-2">Login</h1>
                <p class="text-gray-500 mb-8 text-sm">Login to your account</p>
                
                 <div class="w-full flex items-center bg-gray-50 rounded-lg px-4 py-3 mb-4 border border-gray-200 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 transition-all">
                    <i class="fa-solid fa-envelope text-gray-400"></i>
                    <input type="text" name="login_username" id="login_username" placeholder="Username or email" required class="bg-transparent outline-none flex-1 ml-3 text-sm">
                </div>
                
                <div class="w-full flex items-center bg-gray-50 rounded-lg px-4 py-3 mb-4 border border-gray-200 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 transition-all relative">
                    <i class="fa-solid fa-lock text-gray-400"></i>
                    <input type="password" name="login_password" placeholder="Password" id="login-password" required class="bg-transparent outline-none flex-1 ml-3 text-sm pr-8">
                    <i class="fa-regular fa-eye-slash cursor-pointer text-gray-400 hover:text-gray-600 absolute right-4" id="toggle-login-password"></i>
                </div>
                
                <div class="w-full flex items-center justify-between mb-8 text-sm">
                    <div class="flex items-center gap-2 text-gray-600">
                        <input type="checkbox" id="remember-me" name="remember_me" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                        <label for="remember-me">Remember Me?</label>
                    </div>
                    <a href="{{ url_for('page.forgot_password') }}" class="text-blue-600 hover:text-blue-800 font-semibold transition-colors">Forgot Password?</a>
                </div>
                
                <div id="login-error" class="hidden text-red-500 text-sm mb-4 w-full text-left"></div>
                
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-full shadow-lg transition-transform hover:-translate-y-0.5">Login</button>
            </form>
        </div>
        
        <!-- OVERLAY -->
        <div class="absolute top-0 left-1/2 w-1/2 h-full overflow-hidden transition-transform duration-500 ease-in-out z-50 overlay-container">
            <div class="bg-blue-600 bg-gradient-to-br from-blue-700 to-blue-500 text-white relative -left-full h-full w-[200%] transform translate-x-0 transition-transform duration-500 ease-in-out overlay">
                
                <!-- Overlay Kiri (Untuk Register) -->
                <div class="absolute top-0 flex flex-col items-center justify-center w-1/2 h-full px-12 text-center transform -translate-x-[20%] transition-transform duration-500 ease-in-out overlay-left">
                    <div class="bg-white/20 p-4 rounded-2xl backdrop-blur-sm mb-6 shadow-lg">
                        <img src="{{ url_for('static', filename='logo-moneytime-aga-gedean.svg') }}" alt="MoneyTime Logo" class="w-16 h-16 object-contain">
                    </div>
                    <h2 class="text-3xl font-black mb-4">Welcome to MoneyTime</h2>
                    <p class="text-blue-100 mb-8 font-medium">The smart way to manage your time and money.</p>
                    <p class="text-sm text-blue-200 mb-3">Already have an account?</p>
                    <button class="border-2 border-white rounded-full px-10 py-2.5 font-bold hover:bg-white hover:text-blue-600 transition-colors" id="show-login-btn">Login</button>
                </div>
                
                <!-- Overlay Kanan (Untuk Login) -->
                <div class="absolute top-0 right-0 flex flex-col items-center justify-center w-1/2 h-full px-12 text-center transform translate-x-0 transition-transform duration-500 ease-in-out overlay-right">
                    <div class="bg-white/20 p-4 rounded-2xl backdrop-blur-sm mb-6 shadow-lg">
                        <img src="{{ url_for('static', filename='logo-moneytime-aga-gedean.svg') }}" alt="MoneyTime Logo" class="w-16 h-16 object-contain">
                    </div>
                    <h2 class="text-3xl font-black mb-4">Welcome Back!</h2>
                    <p class="text-blue-100 mb-8 font-medium">Let's continue where you left off. Efficient as always.</p>
                    <p class="text-sm text-blue-200 mb-3">Don't have an account?</p>
                    <button class="border-2 border-white rounded-full px-10 py-2.5 font-bold hover:bg-white hover:text-blue-600 transition-colors" id="show-register-btn">Register</button>
                </div>
                
            </div>
        </div>
        
    </div>

    <!-- SUCCESS POPUP -->
    <div id="login-success-popup" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[100]">
        <div class="bg-white rounded-2xl p-8 shadow-2xl flex flex-col items-center animate-bounce">
            <img src="{{ url_for('static', filename='contreng-(2).png') }}" alt="Success" class="w-24 h-24 mb-4">
            <h3 class="text-xl font-bold text-gray-800">Success!</h3>
        </div>
    </div>

    <script src="{{ url_for('static', filename='scriptRegisLogin.js') }}"></script>
</body>
</html>
