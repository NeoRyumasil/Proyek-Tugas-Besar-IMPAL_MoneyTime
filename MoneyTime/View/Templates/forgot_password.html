<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyTime - Reset Password</title>
    
    <link rel="icon" href="{{ url_for('static', filename='logoMoneyTime.svg') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-gray-100 flex justify-center items-center h-screen font-sans antialiased text-gray-800">

    <!-- Main Container -->
    <div class="w-full max-w-md bg-white shadow-2xl rounded-2xl overflow-hidden p-10 transition-all duration-300" id="main-container">
        
        <!-- EMAIL -->
        <div class="step-container" id="step-1-email">
            <form class="flex flex-col text-center" id="form-send-otp">
                <h1 class="text-3xl font-extrabold mb-2">Forgot Password?</h1>
                <p class="text-gray-500 mb-8 text-sm">Don’t worry! Enter your email address below.</p>
                
                <div class="w-full flex items-center bg-gray-50 rounded-lg px-4 py-3 mb-6 border border-gray-200 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 transition-all text-left">
                    <i class="fa-solid fa-envelope text-gray-400"></i>
                    <input type="email" name="email" placeholder="Enter your email" required class="bg-transparent outline-none flex-1 ml-3 text-sm">
                </div>
                
                <div id="step-1-error" class="text-red-500 text-sm mb-4 w-full text-left" style="display: none;"></div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-full shadow-lg transition-transform hover:-translate-y-0.5">Next</button>
            </form>
        </div>

        <!-- OTP -->
        <div class="step-container" id="step-2-otp" style="display: none;">
            <form class="flex flex-col text-center" id="form-verify-otp">
                <h1 class="text-3xl font-extrabold mb-2">Verify Email</h1>
                <p class="text-gray-500 mb-8 text-sm">We’ve sent a 4-digit verification code to your email. Please enter the code below.</p>
                
                <!-- Input OTP -->
                <div class="otp-inputs w-full flex items-center justify-center gap-4 mb-6">
                    <input type="text" id="otp-1" maxlength="1" required class="w-14 h-14 text-center text-2xl font-bold bg-gray-50 border border-gray-200 rounded-lg focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all">
                    <input type="text" id="otp-2" maxlength="1" required class="w-14 h-14 text-center text-2xl font-bold bg-gray-50 border border-gray-200 rounded-lg focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all">
                    <input type="text" id="otp-3" maxlength="1" required class="w-14 h-14 text-center text-2xl font-bold bg-gray-50 border border-gray-200 rounded-lg focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all">
                    <input type="text" id="otp-4" maxlength="1" required class="w-14 h-14 text-center text-2xl font-bold bg-gray-50 border border-gray-200 rounded-lg focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all">
                </div>

                <p class="text-sm text-gray-600 mb-6">
                    Didn’t receive a code? 
                    <a href="#" id="resend-link" class="text-blue-600 hover:text-blue-800 font-semibold transition-colors">Resend</a>
                </p>
                
                <div id="step-2-error" class="text-red-500 text-sm mb-4 w-full text-left" style="display: none;"></div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-full shadow-lg transition-transform hover:-translate-y-0.5">Verify Email</button>
            </form>
        </div>

        <!-- NEW PASSWORD -->
        <div class="step-container" id="step-3-password" style="display: none;">
            <form class="flex flex-col text-center" id="form-update-password">
                <h1 class="text-3xl font-extrabold mb-2">New Password</h1>
                <p class="text-gray-500 mb-8 text-sm">Create a strong new password.</p>
                
                <div class="w-full flex items-center bg-gray-50 rounded-lg px-4 py-3 mb-4 border border-gray-200 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 transition-all relative text-left">
                    <i class="fa-solid fa-lock text-gray-400"></i>
                    <input type="password" name="new_password" id="new-password" placeholder="New password" required class="bg-transparent outline-none flex-1 ml-3 text-sm pr-8">
                    <i class="fa-regular fa-eye-slash cursor-pointer text-gray-400 hover:text-gray-600 absolute right-4" id="toggle-new-password"></i>
                </div>
                
                <div class="w-full flex items-center bg-gray-50 rounded-lg px-4 py-3 mb-8 border border-gray-200 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 transition-all relative text-left">
                    <i class="fa-solid fa-lock text-gray-400"></i>
                    <input type="password" name="confirm_password" id="confirm-password" placeholder="Confirm password" required class="bg-transparent outline-none flex-1 ml-3 text-sm pr-8">
                    <i class="fa-regular fa-eye-slash cursor-pointer text-gray-400 hover:text-gray-600 absolute right-4" id="toggle-confirm-password"></i>
                </div>

                <div id="step-3-error" class="text-red-500 text-sm mb-4 w-full text-left" style="display: none;"></div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-full shadow-lg transition-transform hover:-translate-y-0.5">Update Password</button>
            </form>
        </div>

    </div>

    <div class="fixed bottom-6 right-6 z-50 flex flex-col gap-3" id="toast-container"></div>

    <script src="{{ url_for('static', filename='scriptForgotPassword.js') }}"></script>
</body>
</html>
